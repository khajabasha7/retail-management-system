name: Retail Management CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  test:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22


    - name: Install Backend Dependencies
      working-directory: server
      run: npm install


    - name: Install Frontend Dependencies
      working-directory: client
      run: npm install


    - name: Backend Check
      working-directory: server
      run: npm run test


    - name: Frontend Build
      working-directory: client
      run: npm run build


